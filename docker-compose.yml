name: untitled-kanban-nest

services:
  main:
    container_name: main
    build:
      context: .
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - 8000:8000
    command: sh -c "npx prisma generate && npx prisma db push && npm run start:dev"
    depends_on:
      - mysql
    restart: always

  mysql:
    container_name: mysql
    image: mysql:lts
    env_file:
      - .env
    ports:
      - 3306:3306
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data:
